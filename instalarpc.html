<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalar SimuPLC Lab en PC</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:#f1f5f9;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      color:#0f172a;
    }

    .box{
      width:100%;
      max-width:520px;
      background:#ffffff;
      border-radius:18px;
      padding:28px;
      text-align:center;
      box-shadow:0 15px 40px rgba(15,23,42,.15);
      border:1px solid #e2e8f0;
    }

    h1{
      font-size:28px;
      margin-bottom:12px;
      color:#0f172a;
    }

    p{
      color:#475569;
      font-size:16px;
      line-height:1.6;
      margin-bottom:22px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:16px 20px;
      font-size:17px;
      font-weight:bold;
      background:#2563eb;
      color:#ffffff;
      cursor:pointer;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    .help{
      margin-top:18px;
      font-size:14px;
      color:#64748b;
      line-height:1.5;
    }

    .back{
      display:inline-block;
      margin-top:18px;
      color:#2563eb;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Instalar SimuPLC Lab en PC</h1>

    <p>
      Presiona el botón para instalar SimuPLC Lab como aplicación en tu computadora.
      Funciona mejor en Google Chrome o Microsoft Edge.
    </p>

    <button id="installBtn" class="btn">
      Instalar App en PC
    </button>

    <div class="help" id="helpText">
      Si no aparece la ventana de instalación, abre esta página desde Chrome o Edge.
    </div>

    <a href="https://escuelapasir.com/instalar-simuplc.html" class="back">← Volver </a>
  </div>

  <script>
    let deferredPrompt = null;

    const installBtn = document.getElementById("installBtn");
    const helpText = document.getElementById("helpText");

    window.addEventListener("beforeinstallprompt", function(e) {
      e.preventDefault();
      deferredPrompt = e;
      helpText.textContent = "Listo. Presiona el botón para instalar la app.";
    });

    installBtn.addEventListener("click", async function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();

        const choiceResult = await deferredPrompt.userChoice;

        if (choiceResult.outcome === "accepted") {
          installBtn.textContent = "Instalando...";
          helpText.textContent = "La instalación fue iniciada correctamente.";
        } else {
          helpText.textContent = "La instalación fue cancelada.";
        }

        deferredPrompt = null;
        return;
      }

      alert("La instalación PWA no está disponible todavía. Abre esta página en Chrome o Edge y verifica que la app tenga manifest.json y service worker activos.");
    });

    window.addEventListener("appinstalled", function() {
      installBtn.textContent = "App instalada";
      helpText.textContent = "SimuPLC Lab ya fue instalado en tu PC.";
    });
  </script>

</body>
</html>
